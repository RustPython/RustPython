# This action installs a few dependencies necessary to build RustPython on Linux.
# It can be configured depending on which libraries are needed:
#
# ```
# - uses: ./.github/actions/install-linux-deps
#   with:
#     gcc-multilib: true
#     musl-tools: false
# ```
#
# See the `inputs` section for all options and their defaults. Note that you must checkout the
# repository before you can use this action.
#
# This action will only install dependencies when the current operating system is Linux. It will do
# nothing on any other OS (macOS, Windows).

name: Install Linux dependencies
description: Installs the dependencies necessary to build RustPython on Linux.
inputs:
  gcc-multilib:
    description: Install gcc-multilib (gcc-multilib)
    required: false
    default: "false"
  musl-tools:
    description: Install musl-tools (musl-tools)
    required: false
    default: "false"
  gcc-aarch64-linux-gnu:
    description: Install gcc-aarch64-linux-gnu (gcc-aarch64-linux-gnu)
    required: false
    default: "false"
  clang:
    description: Install clang (clang)
    required: false
    default: "false"
runs:
  using: composite
  steps:
    - name: Install Linux dependencies
      shell: bash
      if: ${{ runner.os == 'Linux' }}
      run: |
        if ! sudo apt-get update; then
          echo "::warning::apt-get update failed; disabling nonessential Microsoft apt sources and retrying"
          for source in /etc/apt/sources.list.d/*microsoft* /etc/apt/sources.list.d/*azure-cli*; do
            if [ -e "$source" ]; then
              sudo mv "$source" "$source.disabled"
            fi
          done
          sudo apt-get update
        fi

        packages=()
        if [[ "${{ inputs.gcc-multilib }}" == "true" ]]; then
          packages+=(gcc-multilib)
        fi
        if [[ "${{ inputs.musl-tools }}" == "true" ]]; then
          packages+=(musl-tools)
        fi
        if [[ "${{ inputs.clang }}" == "true" ]]; then
          packages+=(clang)
        fi
        if [[ "${{ inputs.gcc-aarch64-linux-gnu }}" == "true" ]]; then
          packages+=(gcc-aarch64-linux-gnu linux-libc-dev-arm64-cross libc6-dev-arm64-cross)
        fi

        if ((${#packages[@]})); then
          sudo apt-get install --no-install-recommends "${packages[@]}"
        fi
